<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Multi-Core Particle Test</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; color: #fff; font-family: monospace; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 6px; border: 1px solid #333; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div>Số nhân CPU dùng: <b id="threads" style="color: #00ffcc;">0</b></div>
        <div>Tổng số hạt: <b id="count" style="color: #00ffcc;">0</b></div>
        <div>FPS: <b id="fps" style="color: #ffaa00;">0</b></div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const numThreads = navigator.hardwareConcurrency || 4;
        document.getElementById('threads').innerText = numThreads;

        // Số hạt trên mỗi nhân CPU (chỉnh lên/xuống tùy ý)
        const particlesPerThread = 20000; 
        const totalParticles = numThreads * particlesPerThread;
        document.getElementById('count').innerText = totalParticles.toLocaleString();

        // Code chạy riêng trên từng nhân CPU
        const workerCode = `
            let x, y, vx, vy, count, w, h;

            self.onmessage = function(e) {
                if (e.data.type === 'init') {
                    count = e.data.count;
                    w = e.data.w;
                    h = e.data.h;
                    x = new Float32Array(count);
                    y = new Float32Array(count);
                    vx = new Float32Array(count);
                    vy = new Float32Array(count);

                    for (let i = 0; i < count; i++) {
                        x[i] = Math.random() * w;
                        y[i] = Math.random() * h;
                        vx[i] = (Math.random() - 0.5) * 3;
                        vy[i] = (Math.random() - 0.5) * 3;
                    }
                }

                // Cập nhật vị trí hạt
                for (let i = 0; i < count; i++) {
                    x[i] += vx[i];
                    y[i] += vy[i];
                    if (x[i] < 0 || x[i] > w) vx[i] *= -1;
                    if (y[i] < 0 || y[i] > h) vy[i] *= -1;
                }

                // Gửi tọa độ về cho giao diện chính vẽ
                self.postMessage({ x: x, y: y });
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);

        const workers = [];
        const threadData = [];

        for (let i = 0; i < numThreads; i++) {
            const w = new Worker(workerUrl);
            w.postMessage({ type: 'init', count: particlesPerThread, w: canvas.width, h: canvas.height });
            
            w.onmessage = function(e) {
                threadData[i] = e.data;
            };
            workers.push(w);
        }

        let lastTime = performance.now();
        let frames = 0;

        function render() {
            // Hiệu ứng vệt mờ (Trail)
            ctx.fillStyle = 'rgba(5, 5, 5, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ffcc';

            for (let i = 0; i < numThreads; i++) {
                if (threadData[i]) {
                    const { x, y } = threadData[i];
                    for (let j = 0; j < x.length; j++) {
                        ctx.fillRect(x[j], y[j], 1.5, 1.5);
                    }
                    // Báo nhân CPU tính toán khung hình tiếp theo
                    workers[i].postMessage('update');
                }
            }

            frames++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                document.getElementById('fps').innerText = frames;
                frames = 0;
                lastTime = now;
            }

            requestAnimationFrame(render);
        }

        // Đợi 100ms cho các Worker khởi tạo xong rồi phát hình
        setTimeout(render, 100);
    </script>
</body>
</html>
