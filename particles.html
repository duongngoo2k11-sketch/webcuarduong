<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Multi-Core Particle Simulation</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: monospace; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div>Số nhân CPU đang dùng: <b id="threads">0</b></div>
        <div>Tổng số hạt: <b id="count">0</b></div>
        <div>FPS: <b id="fps">0</b></div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const numThreads = navigator.hardwareConcurrency || 4;
        document.getElementById('threads').innerText = numThreads;

        // Số hạt trên mỗi thread (Ví dụ 50,000 hạt / thread)
        const particlesPerThread = 30000; 
        const totalParticles = numThreads * particlesPerThread;
        document.getElementById('count').innerText = totalParticles.toLocaleString();

        // Mã code cho Worker chạy trên từng nhân CPU
        const workerCode = `
            let particles;
            self.onmessage = function(e) {
                const { type, count, width, height } = e.data;
                if (type === 'init') {
                    particles = new Float32Array(count * 4); // x, y, vx, vy
                    for (let i = 0; i < count * 4; i += 4) {
                        particles[i] = Math.random() * width;
                        particles[i+1] = Math.random() * height;
                        particles[i+2] = (Math.random() - 0.5) * 2;
                        particles[i+3] = (Math.random() - 0.5) * 2;
                    }
                } else if (type === 'update') {
                    for (let i = 0; i < particles.length; i += 4) {
                        particles[i] += particles[i+2];
                        particles[i+1] += particles[i+3];
                        if (particles[i] < 0 || particles[i] > width) particles[i+2] *= -1;
                        if (particles[i+1] < 0 || particles[i+1] > height) particles[i+3] *= -1;
                    }
                    self.postMessage(particles.buffer, [particles.buffer]);
                }
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);

        const workers = [];
        const workerBuffers = [];

        for (let i = 0; i < numThreads; i++) {
            const w = new Worker(workerUrl);
            w.postMessage({ type: 'init', count: particlesPerThread, width: canvas.width, height: canvas.height });
            
            w.onmessage = function(e) {
                workerBuffers[i] = new Float32Array(e.data);
            };
            workers.push(w);
        }

        let lastTime = performance.now();
        let frames = 0;

        function render() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ffcc';

            for (let i = 0; i < numThreads; i++) {
                if (workerBuffers[i]) {
                    const buf = workerBuffers[i];
                    for (let j = 0; j < buf.length; j += 4) {
                        ctx.fillRect(buf[j], buf[j+1], 1.5, 1.5);
                    }
                    // Gửi lại dữ liệu cho worker tiếp tục tính toán
                    workers[i].postMessage({ type: 'update' }, [buf.buffer]);
                    workerBuffers[i] = null;
                }
            }

            frames++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                document.getElementById('fps').innerText = frames;
                frames = 0;
                lastTime = now;
            }

            requestAnimationFrame(render);
        }

        setTimeout(render, 500);
    </script>
</body>
</html>
