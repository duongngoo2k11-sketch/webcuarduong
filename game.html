<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Retro Space Shooter</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
        #game-container { position: relative; }
        canvas { border: 2px solid #333; background: #0a0a12; box-shadow: 0 0 20px rgba(0,255,200,0.2); }
        .hud { position: absolute; top: 15px; left: 15px; color: #00ffcc; font-size: 18px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="hud">Điểm: <span id="score">0</span></div>
        <canvas id="gc" width="400" height="600"></canvas>
    </div>

    <script>
        const cvs = document.getElementById('gc');
        const ctx = cvs.getContext('2d');
        
        let score = 0;
        let gameOver = false;

        const player = { x: 180, y: 520, w: 40, h: 40, speed: 5 };
        const bullets = [];
        const enemies = [];
        const keys = {};

        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);

        function spawnEnemy() {
            if (Math.random() < 0.03) {
                enemies.push({
                    x: Math.random() * (cvs.width - 30),
                    y: -30,
                    w: 30,
                    h: 30,
                    speed: 2 + Math.random() * 2
                });
            }
        }

        let lastShoot = 0;
        function update(now) {
            if (gameOver) return;

            // Di chuyển
            if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['KeyD']) && player.x < cvs.width - player.w) player.x += player.speed;
            
            // Bắn đạn
            if (keys['Space'] && now - lastShoot > 150) {
                bullets.push({ x: player.x + player.w/2 - 3, y: player.y, w: 6, h: 12 });
                lastShoot = now;
            }

            // Update Đạn
            bullets.forEach((b, index) => {
                b.y -= 7;
                if (b.y < -10) bullets.splice(index, 1);
            });

            // Update Kẻ địch
            spawnEnemy();
            enemies.forEach((e, eIdx) => {
                e.y += e.speed;

                // Va chạm với player
                if (e.x < player.x + player.w && e.x + e.w > player.x &&
                    e.y < player.y + player.h && e.y + e.h > player.y) {
                    gameOver = true;
                    alert('GAME OVER! Số điểm của bạn: ' + score);
                    document.location.reload();
                }

                // Va chạm với đạn
                bullets.forEach((b, bIdx) => {
                    if (b.x < e.x + e.w && b.x + b.w > e.x &&
                        b.y < e.y + e.h && b.y + b.h > e.y) {
                        enemies.splice(eIdx, 1);
                        bullets.splice(bIdx, 1);
                        score += 10;
                        document.getElementById('score').innerText = score;
                    }
                });

                if (e.y > cvs.height) enemies.splice(eIdx, 1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, cvs.width, cvs.height);

            // Vẽ Player (Tam giác xanh)
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.moveTo(player.x + player.w / 2, player.y);
            ctx.lineTo(player.x, player.y + player.h);
            ctx.lineTo(player.x + player.w, player.y + player.h);
            ctx.fill();

            // Vẽ Đạn (Vàng)
            ctx.fillStyle = '#ff0';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Vẽ Kẻ địch (Đỏ)
            ctx.fillStyle = '#ff4444';
            enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));
        }

        function loop(timestamp) {
            update(timestamp);
            draw();
            if (!gameOver) requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
