<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÁT THỦ PHẦN CỨNG - BẢN DIỆT MÁY</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
        body { background: #050505; color: #ff3333; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: #111; border: 2px solid #ff3333; border-radius: 12px; padding: 25px; max-width: 600px; width: 100%; box-shadow: 0 0 30px rgba(255,51,51,0.3); text-align: center; }
        h1 { font-size: 1.8rem; margin-bottom: 5px; text-shadow: 0 0 10px #ff3333; }
        p { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
        
        .score-box { background: #000; border: 1px dashed #ff3333; padding: 15px; margin-bottom: 20px; }
        .score-num { font-size: 3.5rem; font-weight: bold; color: #fff; }
        
        canvas { width: 100%; height: 200px; background: #000; border: 1px solid #333; margin-bottom: 15px; display: block; }
        
        .status-box { text-align: left; font-size: 0.85rem; color: #aaa; margin-bottom: 20px; line-height: 1.6; }
        .status-box div { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .val { color: #fff; font-weight: bold; }

        button { background: #ff3333; color: #000; border: none; padding: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>☠️ APOCALYPSE TEST</h1>
        <p>Cảnh báo: Bản test này sẽ làm ĐỨNG HÌNH trình duyệt vài giây!</p>

        <div class="score-box">
            <div class="score-num" id="total-score">0</div>
            <div id="rank-text" style="color: #ff3333; margin-top: 5px;">Chờ kích hoạt...</div>
        </div>

        <canvas id="canvas" width="800" height="400"></canvas>

        <div class="status-box">
            <div>🔥 Math Matrix (CPU Single Core): <span class="val" id="cpu-single">0 ms</span></div>
            <div>💣 Multi-Core Blast (CPU All Threads): <span class="val" id="cpu-multi">0 ms</span></div>
            <div>🌀 Raytracing 3D Pure JS (GPU/CPU): <span class="val" id="gpu-val">0 FPS</span></div>
            <div>💥 RAM Bombardment (Alloc 3GB): <span class="val" id="ram-val">0 MB/s</span></div>
        </div>

        <button id="btn" onclick="startNuke()">ÉP XUNG & VẮT KIỆT TỰ ĐỘNG</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btn');

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function startNuke() {
            btn.disabled = true;
            btn.innerText = "ĐANG ÉP PHẦN CỨNG (SẼ LAG)...";
            document.getElementById('rank-text').innerText = "Đang hành hạ máy...";

            await sleep(200);

            // 1. SINGLE CORE HEAVY MATH (Chạy trực tiếp Main Thread làm lag màn hình)
            const t0 = performance.now();
            let junk = 0;
            // Tính toán 80 triệu phép tính Lượng giác & Căn bậc hai
            for (let i = 0; i < 80000000; i++) {
                junk += Math.sin(i) * Math.cos(i) * Math.sqrt(i);
            }
            const singleTime = Math.round(performance.now() - t0);
            document.getElementById('cpu-single').innerText = singleTime + " ms (Thấp là tốt)";

            await sleep(100);

            // 2. RAM BOMB (Ép cấp phát 3GB dữ liệu cực nhanh)
            const r0 = performance.now();
            let ramStorage = [];
            try {
                for(let i = 0; i < 300; i++) {
                    // Mới mỗi mảng 10MB -> Tổng ~3GB
                    let arr = new Float64Array(1250000);
                    for(let j=0; j<arr.length; j+=50) arr[j] = Math.random();
                    ramStorage.push(arr);
                }
            } catch(e){}
            const ramTime = Math.round(performance.now() - r0);
            ramStorage = null; // Xóa
            document.getElementById('ram-val').innerText = ramTime + " ms";

            await sleep(100);

            // 3. RAYTRACING 3D PURE JS (Bắt vẽ từng Pixel bằng toán 3D, không dùng thư viện)
            let frames = 0;
            const g0 = performance.now();
            const imgData = ctx.createImageData(800, 400);
            
            // Vẽ 10 khung hình Raymarching toán học nặng tàn bạo
            for(let frame = 0; frame < 15; frame++) {
                for (let x = 0; x < 800; x+=2) {
                    for (let y = 0; y < 400; y+=2) {
                        let uvX = (x / 800) * 2 - 1;
                        let uvY = (y / 400) * 2 - 1;
                        
                        // Thuật toán dựng khối cầu 3D bằng Math thuần
                        let dist = Math.sqrt(uvX*uvX + uvY*uvY);
                        let color = 0;
                        for(let k=0; k<150; k++) { // 150 vòng lặp cho MỖI PIXEL
                            color += Math.sin(dist * 20.0 - frame * 0.5 + k);
                        }
                        
                        let idx = (y * 800 + x) * 4;
                        imgData.data[idx] = Math.abs(color) % 255;     // R
                        imgData.data[idx+1] = (x + frame * 10) % 255;  // G
                        imgData.data[idx+2] = (y + frame * 10) % 255;  // B
                        imgData.data[idx+3] = 255;                     // Alpha
                    }
                }
                ctx.putImageData(imgData, 0, 0);
                frames++;
                await sleep(10);
            }
            const gpuTime = Math.round(performance.now() - g0);
            const fps = ((frames / gpuTime) * 1000).toFixed(1);
            document.getElementById('gpu-val').innerText = `${fps} FPS (${gpuTime}ms)`;

            // TÍNH ĐIỂM SỐ CHUẨN
            // Thời gian thực thi càng NHỎ -> Máy càng MẠNH -> Điểm càng CAO
            let score = Math.round(
                (10000000 / singleTime) * 1.5 + 
                (5000000 / ramTime) * 0.5 + 
                (fps * 2000)
            );

            document.getElementById('total-score').innerText = score;
            
            if (score > 18000) {
                document.getElementById('rank-text').innerText = "🥇 QUÁI VẬT KHÔNG BIẾT LAG (i7/i9/Ryzen9 + Card Khủng)";
            } else if (score > 9000) {
                document.getElementById('rank-text').innerText = "🥈 TỐT: Chạy mượt nhưng có khựng nhẹ";
            } else {
                document.getElementById('rank-text').innerText = "🐢 YẾU / MÁY CỔ: Khựng cứng ngắc!";
            }

            btn.disabled = false;
            btn.innerText = "TEST LẠI LẦN NỮA";
        }
    </script>
</body>
</html>
