<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD-TIER BENCHMARK (FOR RTX 5090 & i9)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: #030303; color: #00ffcc; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: #0a0a0f; border: 2px solid #00ffcc; border-radius: 16px; padding: 30px; max-width: 700px; width: 100%; box-shadow: 0 0 50px rgba(0, 255, 204, 0.2); text-align: center; }
        h1 { font-size: 2rem; color: #fff; text-shadow: 0 0 15px #00ffcc; margin-bottom: 5px; }
        p.subtitle { color: #888; font-size: 0.85rem; margin-bottom: 25px; }
        
        .score-box { background: #000; border: 1px solid #00ffcc; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .score-num { font-size: 4.5rem; font-weight: bold; color: #00ffcc; text-shadow: 0 0 25px #00ffcc; }
        .rank { font-size: 1.1rem; color: #fff; margin-top: 5px; font-weight: bold; }

        canvas { width: 100%; height: 250px; background: #000; border: 1px solid #222; border-radius: 8px; margin-bottom: 20px; display: block; }
        
        .metrics { text-align: left; font-size: 0.85rem; margin-bottom: 25px; line-height: 1.8; color: #aaa; }
        .metrics div { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 4px 0; }
        .val { color: #fff; font-weight: bold; }

        button { background: #00ffcc; color: #000; border: none; padding: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; border-radius: 8px; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; }
        button:hover { background: #fff; box-shadow: 0 0 25px #fff; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>⚡ GOD-TIER BENCHMARK</h1>
        <p class="subtitle">Thử thách hủy diệt dành riêng cho i9 Next-Gen & RTX 5090 (128GB RAM)</p>

        <div class="score-box">
            <div class="score-num" id="total-score">0</div>
            <div class="rank" id="rank-text">SẴN SÀNG HỦY DIỆT</div>
        </div>

        <canvas id="gl-canvas"></canvas>

        <div class="metrics">
            <div>🚀 Multi-Core Matrix Blast (Max Threads): <span class="val" id="m-cpu">Chưa test</span></div>
            <div>🌋 WebGL 2.0 Native Shader (50,000 Particles): <span class="val" id="m-gpu">Chưa test</span></div>
            <div>💥 RAM & VRAM Stress Test (Massive Allocation): <span class="val" id="m-ram">Chưa test</span></div>
        </div>

        <button id="btn" onclick="startGodBenchmark()">BẮT ĐẦU VẮT KIỆT RTX 5090</button>
    </div>

    <script>
        const canvas = document.getElementById('gl-canvas');
        const gl = canvas.getContext('webgl2');

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function startGodBenchmark() {
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = "ĐANG ÉP 100% RTX 5090 & i9...";
            document.getElementById('rank-text').innerText = "Đang chạy bài test Cực Đại...";

            await sleep(200);

            // 1. ÉP MULTI-THREAD CPU (CHẠY TOÀN BỘ LUỒNG CỦA i9)
            const cpuScore = await testGodCPU();
            document.getElementById('m-cpu').innerText = `${cpuScore.toLocaleString()} pts`;

            await sleep(100);

            // 2. ÉP RAM & BĂNG THÔNG DỮ LIỆU
            const ramScore = testGodRAM();
            document.getElementById('m-ram').innerText = `${ramScore.toLocaleString()} pts`;

            await sleep(100);

            // 3. ÉP GPU RTX 5090 (VẼ 50,000 VẬT THỂ NATIVE SHADER 3D)
            const gpuScore = await testGodGPU();
            document.getElementById('m-gpu').innerText = `${gpuScore.toLocaleString()} pts`;

            // TỔNG ĐIỂM DÀNH CHO CẤU HÌNH KHỦNG
            const total = Math.round(cpuScore * 0.35 + gpuScore * 0.45 + ramScore * 0.20);
            document.getElementById('total-score').innerText = total.toLocaleString();

            if (total > 80000) {
                document.getElementById('rank-text').innerText = "👑 QUÁI VẬT VŨ TRỤ: RTX 5090 + i9 ĐÃ KHỦNG BỐ THÀNH CÔNG!";
            } else if (total > 40000) {
                document.getElementById('rank-text').innerText = "🔥 SIÊU MÁY TÍNH: Rất mạnh (Dòng RTX 4090 / i9)";
            } else {
                document.getElementById('rank-text').innerText = "🐢 BỊ NGHẼN BÌNH XĂNG: Không gánh nổi bài test này!";
            }

            btn.disabled = false;
            btn.innerText = "TEST LẠI LẦN NỮA";
        }

        // --- 1. MULTI-CORE WORKER THÙẦN ---
        function testGodCPU() {
            return new Promise(resolve => {
                const threads = navigator.hardwareConcurrency || 16;
                let done = 0;
                let totalOps = 0;
                const start = performance.now();

                const workerCode = `
                    self.onmessage = function() {
                        let ops = 0;
                        for (let i = 0; i < 25000000; i++) {
                            ops += Math.atan(i) * Math.tan(i) + Math.sqrt(i);
                        }
                        self.postMessage(ops);
                    }
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);

                for (let i = 0; i < threads; i++) {
                    const w = new Worker(url);
                    w.postMessage('start');
                    w.onmessage = () => {
                        done++;
                        if (done === threads) {
                            const time = performance.now() - start;
                            URL.revokeObjectURL(url);
                            resolve(Math.round((threads * 500000000) / time));
                        }
                        w.terminate();
                    };
                }
            });
        }

        // --- 2. RAM BĂNG THÔNG CỰC ĐẠI ---
        function testGodRAM() {
            const start = performance.now();
            let chunks = [];
            try {
                // Ép ghi 6GB dữ liệu liên tục vào RAM
                for (let i = 0; i < 600; i++) {
                    let a = new Float64Array(1250000);
                    for (let j = 0; j < a.length; j += 10) a[j] = Math.random();
                    chunks.push(a);
                }
            } catch (e) {}
            const time = performance.now() - start;
            chunks = null;
            return Math.round(15000000 / time);
        }

        // --- 3. WEBGL 2.0 NATIVE SHADER CHO RTX 5090 ---
        function testGodGPU() {
            return new Promise(resolve => {
                if (!gl) { resolve(1000); return; }

                canvas.width = 1000;
                canvas.height = 500;
                gl.viewport(0, 0, canvas.width, canvas.height);

                // Shader tính toán khối hạt khổng lồ
                const vs = `#version 300 es
                    in vec3 aPos;
                    uniform float uTime;
                    void main() {
                        vec3 p = aPos;
                        p.x += sin(uTime + aPos.y * 10.0) * 0.5;
                        p.y += cos(uTime + aPos.x * 10.0) * 0.5;
                        gl_Position = vec4(p, 1.0);
                        gl_PointSize = 3.0;
                    }
                `;
                const fs = `#version 300 es
                    precision highp float;
                    out vec4 fragColor;
                    uniform float uTime;
                    void main() {
                        fragColor = vec4(abs(sin(uTime)), 0.8, 1.0, 1.0);
                    }
                `;

                function createShader(gl, type, src) {
                    const s = gl.createShader(type);
                    gl.shaderSource(s, src);
                    gl.compileShader(s);
                    return s;
                }

                const program = gl.createProgram();
                gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vs));
                gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fs));
                gl.linkProgram(program);
                gl.useProgram(program);

                // Tạo 50,000 điểm 3D
                const count = 50000;
                const positions = new Float32Array(count * 3);
                for(let i=0; i<count*3; i++) positions[i] = (Math.random() - 0.5) * 2;

                const buf = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buf);
                gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

                const aPos = gl.getAttribLocation(program, 'aPos');
                gl.enableVertexAttribArray(aPos);
                gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

                const uTime = gl.getUniformLocation(program, 'uTime');

                let frames = 0;
                const start = performance.now();

                function render() {
                    const elapsed = performance.now() - start;
                    gl.clear(gl.COLOR_BUFFER_BIT);
                    gl.uniform1f(uTime, elapsed * 0.005);
                    gl.drawArrays(gl.POINTS, 0, count);
                    frames++;

                    if (elapsed < 3000) {
                        requestAnimationFrame(render);
                    } else {
                        const fps = (frames * 1000) / 3000;
                        resolve(Math.round(fps * 800));
                    }
                }
                render();
            });
        }
    </script>
</body>
</html>
