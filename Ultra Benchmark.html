<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme Hardware Benchmark (For i7 / RTX+)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #090d16; color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: #111827; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); padding: 30px; max-width: 650px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.7); text-align: center; }
        h1 { color: #f43f5e; font-size: 1.8rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        p.subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }
        
        .score-box { background: rgba(0,0,0,0.4); border-radius: 18px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(244, 63, 94, 0.3); }
        .score-num { font-size: 4rem; font-weight: 900; color: #f43f5e; text-shadow: 0 0 20px rgba(244, 63, 94, 0.5); }
        .score-label { font-size: 0.9rem; color: #e2e8f0; font-weight: bold; }

        #webgl-container { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); background: #000; }

        .test-list { text-align: left; margin-bottom: 20px; }
        .test-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .status { font-weight: bold; color: #e2e8f0; }
        .status.running { color: #f59e0b; }
        .status.done { color: #10b981; }

        button { background: linear-gradient(135deg, #f43f5e, #e11d48); color: #fff; border: none; padding: 14px 32px; font-size: 1rem; font-weight: bold; border-radius: 30px; cursor: pointer; transition: 0.3s; width: 100%; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(244, 63, 94, 0.4); }
        button:disabled { background: #374151; color: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🔥 Extreme Benchmark</h1>
        <p class="subtitle">Bài test nặng dành cho CPU Đa Nhân (i7/i9/Ryzen 7) & GPU RTX</p>

        <div class="score-box">
            <div class="score-num" id="total-score">0</div>
            <div class="score-label" id="rank-text">Sẵn sàng vắt kiệt phần cứng</div>
        </div>

        <div id="webgl-container"></div>

        <div class="test-list">
            <div class="test-item">
                <span>🧠 CPU Multi-Thread (Stress Test)</span>
                <span class="status" id="cpu-status">Chưa chạy</span>
            </div>
            <div class="test-item">
                <span>🎮 WebGL 3D GPU (2000 Meshes + Lights)</span>
                <span class="status" id="gpu-status">Chưa chạy</span>
            </div>
            <div class="test-item">
                <span>⚡ RAM & VRAM Stress (1.5GB Data)</span>
                <span class="status" id="ram-status">Chưa chạy</span>
            </div>
        </div>

        <button id="start-btn" onclick="runExtremeBenchmark()">Bắt Đầu Stress Test</button>
    </div>

    <script>
        let cpuScore = 0, gpuScore = 0, ramScore = 0;

        async function runExtremeBenchmark() {
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            document.getElementById('total-score').innerText = '0';
            document.getElementById('rank-text').innerText = 'Đang vắt kiệt phần cứng...';

            // 1. Multi-thread CPU Test
            setStat('cpu-status', 'Đang ép 100% CPU...', 'running');
            await sleep(100);
            cpuScore = await testCPUParallel();
            setStat('cpu-status', `${cpuScore} pts`, 'done');

            // 2. RAM & Bandwidth Test
            setStat('ram-status', 'Ghi 1.5GB RAM...', 'running');
            await sleep(100);
            ramScore = testExtremeRAM();
            setStat('ram-status', `${ramScore} pts`, 'done');

            // 3. WebGL GPU Test (3D thực sự)
            setStat('gpu-status', 'Render 3D WebGL (4s)...', 'running');
            gpuScore = await testWebGLGPU();
            setStat('gpu-status', `${gpuScore} pts`, 'done');

            // Tính tổng điểm
            const total = Math.round((cpuScore * 0.4) + (gpuScore * 0.4) + (ramScore * 0.2));
            document.getElementById('total-score').innerText = total;
            document.getElementById('rank-text').innerText = getExtremeRank(total);

            btn.disabled = false;
        }

        function setStat(id, text, className) {
            const el = document.getElementById(id);
            el.innerText = text;
            el.className = `status ${className}`;
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        // Test CPU Đa luồng bằng Web Workers
        function testCPUParallel() {
            return new Promise(resolve => {
                const threadCount = navigator.hardwareConcurrency || 4;
                let completed = 0;
                let totalOperations = 0;
                const startTime = performance.now();

                const workerCode = `
                    self.onmessage = function() {
                        let ops = 0;
                        for (let i = 2; i < 8000000; i++) {
                            let isPrime = true;
                            for (let j = 2; j * j <= i; j++) {
                                if (i % j === 0) { isPrime = false; break; }
                            }
                            if (isPrime) ops++;
                        }
                        self.postMessage(ops);
                    }
                `;

                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(blob);

                for (let i = 0; i < threadCount; i++) {
                    const worker = new Worker(workerUrl);
                    worker.postMessage('start');
                    worker.onmessage = function() {
                        completed++;
                        if (completed === threadCount) {
                            const duration = performance.now() - startTime;
                            const score = Math.round((threadCount * 50000000) / duration);
                            URL.revokeObjectURL(workerUrl);
                            resolve(score);
                        }
                        worker.terminate();
                    };
                }
            });
        }

        // Test RAM Nặng: Ghi 1.5 GB dữ liệu
        function testExtremeRAM() {
            const start = performance.now();
            let storage = [];
            try {
                for (let i = 0; i < 150; i++) {
                    storage.push(new Float64Array(1250000)); // ~1.5 GB
                }
            } catch(e) { }
            const duration = performance.now() - start;
            storage = null;
            return Math.max(100, Math.round(2000000 / duration));
        }

        // Test WebGL 3D GPU với Three.js
        function testWebGLGPU() {
            return new Promise(resolve => {
                const container = document.getElementById('webgl-container');
                container.innerHTML = '';

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                renderer.shadowMap.enabled = true;
                container.appendChild(renderer.domElement);

                // Thêm ánh sáng phức tạp
                const light1 = new THREE.PointLight(0xff0055, 2, 50);
                light1.position.set(10, 10, 10);
                scene.add(light1);

                const light2 = new THREE.PointLight(0x00aaff, 2, 50);
                light2.position.set(-10, -10, 10);
                scene.add(light2);

                // Tạo 2000 vật thể 3D
                const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                const material = new THREE.MeshStandardMaterial({ roughness: 0.3, metalness: 0.8 });
                const meshes = [];

                for (let i = 0; i < 2000; i++) {
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set((Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20);
                    scene.add(mesh);
                    meshes.push(mesh);
                }

                camera.position.z = 15;

                let frames = 0;
                const startTime = performance.now();

                function animate() {
                    const elapsed = performance.now() - startTime;
                    meshes.forEach((m, idx) => {
                        m.rotation.x += 0.02;
                        m.rotation.y += 0.01;
                    });
                    scene.rotation.y += 0.01;

                    renderer.render(scene, camera);
                    frames++;

                    if (elapsed < 4000) {
                        requestAnimationFrame(animate);
                    } else {
                        const fps = (frames * 1000) / 4000;
                        container.innerHTML = '';
                        resolve(Math.round(fps * 250)); // Quy đổi FPS ra điểm WebGL
                    }
                }
                animate();
            });
        }

        function getExtremeRank(score) {
            if (score > 12000) return "🚀 QUÁI VẬT: RTX 3080/4080 + i7/i9 Cực Mạnh";
            if (score > 7500) return "⚡ TỐT: Khả năng cao là RTX 2060 / 3060 + i7";
            if (score > 4000) return "💻 TRUNG BÌNH: Cấu hình Văn Phòng / Gaming Phổ Thông";
            return "🐢 YẾU: Máy không đủ sức chạy tác vụ nặng";
        }
    </script>
</body>
</html>
